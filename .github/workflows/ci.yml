name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tree
          POSTGRES_PASSWORD: tree
          POSTGRES_DB: tree_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://tree:tree@localhost:5432/tree_test
      DB_SSL: 'false'
      DISABLE_RATE_LIMIT: 'true'
      JWT_SECRET: ci-test-secret
      PORT: '3001'
      TEST_BASE_URL: http://localhost:3001/api
      # Dummy keys so AI SDK clients constructed at module-load don't crash boot.
      # Tests never hit AI routes; these are never used for real calls.
      OPENAI_API_KEY: ci-dummy-openai
      GEMINI_API_KEY: ci-dummy-gemini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Migrate schema (fresh DB, no demo business data)
        run: node scripts/migrate.js

      - name: Seed dev/CI test accounts (not for production)
        run: node scripts/seed_dev_users.js

      - name: Start backend
        run: |
          node app.js > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health >/dev/null; then
              echo "backend is up"; exit 0
            fi
            sleep 1
          done
          echo "backend failed to start"; cat server.log; exit 1

      - name: Run test runner (invariants + journeys + contracts)
        run: node tests/runner.js

      - name: Print server log on failure
        if: failure()
        run: cat server.log || true

      - name: Stop backend
        if: always()
        run: '[ -f server.pid ] && kill "$(cat server.pid)" || true'
